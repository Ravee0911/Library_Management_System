{% extends "base.html" %}
{% block content %}

<h1 class="mb-4">Borrow a Book</h1>

{% if books|length == 0 %}
    <p class="text-muted">No books are available to borrow right now.</p>
{% elif members|length == 0 %}
    <p class="text-muted">You need to add a member first. <a href="{{ url_for('add_member') }}">Add one here</a>.</p>
{% else %}
<form method="POST" class="col-md-6">
    <div class="mb-3">
        <label class="form-label">Select Book</label>
        <select name="book_id" class="form-select" required>
            {% for book in books %}
                <option value="{{ book.id }}">{{ book.title }} ({{ book.available_copies }} available)</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Select Member</label>
        <select name="member_id" class="form-select" required>
            {% for member in members %}
                <option value="{{ member.id }}">{{ member.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-success">Confirm Borrow</button>
</form>
{% endif %}

{% endblock %}

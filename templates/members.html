{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>All Members</h1>
    <a href="{{ url_for('add_member') }}" class="btn btn-primary">+ Add New Member</a>
</div>

{% if members|length == 0 %}
    <p class="text-muted">No members yet. Click "Add New Member" to get started!</p>
{% else %}
<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for member in members %}
        <tr>
            <td>{{ member.name }}</td>
            <td>{{ member.email }}</td>
            <td>
                <form action="{{ url_for('delete_member', member_id=member.id) }}" method="POST" style="display:inline;"
                      onsubmit="return confirm('Delete this member?');">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}

{% endblock %}

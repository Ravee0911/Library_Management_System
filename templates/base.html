<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Management System</title>
    <!-- Bootstrap gives us nice-looking buttons, tables, and forms for free -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>

    <!-- Top navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('home') }}">📚 Library System</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('home') }}">Dashboard</a>
                <a class="nav-link" href="{{ url_for('list_books') }}">Books</a>
                <a class="nav-link" href="{{ url_for('list_members') }}">Members</a>
                <a class="nav-link" href="{{ url_for('borrow_book') }}">Borrow</a>
                <a class="nav-link" href="{{ url_for('history') }}">History</a>
            </div>
        </div>
    </nav>

    <div class="container">

        <!-- Flash messages show short pop-up notes like "Book added!" -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Each page fills in its own content here -->
        {% block content %}{% endblock %}

    </div>

</body>
</html>

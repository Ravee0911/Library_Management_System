{% extends "base.html" %}
{% block content %}

<h1 class="mb-4">Edit Book</h1>

<form method="POST" class="col-md-6">
    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" value="{{ book.title }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Author</label>
        <input type="text" name="author" class="form-control" value="{{ book.author }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">ISBN (optional)</label>
        <input type="text" name="isbn" class="form-control" value="{{ book.isbn or '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Number of Copies</label>
        <input type="number" name="copies" class="form-control" value="{{ book.total_copies }}" min="1" required>
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{{ url_for('list_books') }}" class="btn btn-link">Cancel</a>
</form>

{% endblock %}
